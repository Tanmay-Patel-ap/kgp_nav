<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KGP Navigator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <link rel="stylesheet" href="css/map.css">
  <link rel="stylesheet" href="css/search.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

  <!-- LEFT PANEL -->
  <aside id="left-panel">

    <!-- Header -->
    <div id="panel-header">
      <div id="logo">
        <div id="logo-mark">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <circle cx="9" cy="9" r="8" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="9" cy="9" r="3" fill="currentColor"/>
            <line x1="9" y1="1" x2="9" y2="4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="9" y1="14" x2="9" y2="17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="1" y1="9" x2="4" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="14" y1="9" x2="17" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <div id="logo-title">KGP Navigator</div>
          <div id="logo-sub">IIT Kharagpur</div>
        </div>
      </div>
      <div id="panel-actions">
        <button id="theme-btn" title="Toggle theme" onclick="toggleTheme()">
          <span id="theme-icon-moon">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
              <path d="M7.5 1a6.5 6.5 0 1 0 6.364 7.918A5 5 0 0 1 7.5 1z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
            </svg>
          </span>
          <span id="theme-icon-sun" style="display:none">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
              <circle cx="7.5" cy="7.5" r="3" stroke="currentColor" stroke-width="1.4"/>
              <line x1="7.5" y1="0.5" x2="7.5" y2="2.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              <line x1="7.5" y1="12.5" x2="7.5" y2="14.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              <line x1="0.5" y1="7.5" x2="2.5" y2="7.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              <line x1="12.5" y1="7.5" x2="14.5" y2="7.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              <line x1="2.55" y1="2.55" x2="3.96" y2="3.96" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              <line x1="11.04" y1="11.04" x2="12.45" y2="12.45" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              <line x1="2.55" y1="12.45" x2="3.96" y2="11.04" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              <line x1="11.04" y1="3.96" x2="12.45" y2="2.55" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
          </span>
        </button>
        <button id="collapse-btn" title="Collapse sidebar" onclick="togglePanel()">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M9 2L4 7L9 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Outdoor content -->
    <div id="outdoor-content">

    <!-- Search expand button (visible when search is collapsed) -->
    <button id="search-expand-btn" title="Show search">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.4"/>
        <line x1="9.5" y1="9.5" x2="13" y2="13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      Search
    </button>

    <!-- Search section -->
    <div id="search-section">

      <div id="fields-wrap">
        <div class="field-wrap" id="origin-wrap">
          <div class="field-dot origin-dot"></div>
          <div class="field-inner">
            <label class="field-label">FROM</label>
            <div class="inputs-row">
               <input type="text" id="origin-input" placeholder="Search origin..." autocomplete="off" readonly onfocus="this.removeAttribute('readonly')"/>
              <div class="room-select-wrap">
                <input type="text" id="origin-room-input" placeholder="Main gate" autocomplete="off" disabled/>
                <div class="room-dropdown" id="origin-room-dropdown"></div>
              </div>
            </div>
          </div>
          <div class="search-dropdown" id="origin-dropdown"></div>
        </div>

        <div class="field-wrap" id="dest-wrap">
          <div class="field-dot dest-dot"></div>
          <div class="field-inner">
            <label class="field-label">TO</label>
            <div class="inputs-row">
               <input type="text" id="dest-input" placeholder="Search destination..." autocomplete="off" readonly onfocus="this.removeAttribute('readonly')"/>
              <div class="room-select-wrap">
                <input type="text" id="dest-room-input" placeholder="Main gate" autocomplete="off" disabled/>
                <div class="room-dropdown" id="dest-room-dropdown"></div>
              </div>
            </div>
          </div>
          <div class="search-dropdown" id="dest-dropdown"></div>
        </div>
      </div>

      <button id="route-btn">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M1 7h12M8 2l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Get Route
      </button>

    </div>

    <!-- Divider -->
    <div class="panel-divider"></div>

    <!-- Route result -->
    <div id="route-result" class="hidden">

      <div id="route-stats">
        <div class="stat-card">
          <div class="stat-value" id="route-distance">—</div>
          <div class="stat-label">Distance</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="route-time">—</div>
          <div class="stat-label">Walking</div>
        </div>
      </div>

      <div id="route-path-section">
        <div class="section-label">ROUTE</div>
        <div id="steps-list"></div>
      </div>

      <button id="clear-route-btn">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Clear route
      </button>

    </div>

    </div> <!-- /outdoor-content -->

    <!-- Auth box -->
    <div id="auth-box">
      <button id="get-started-btn">Get Started</button>
      <div id="auth-profile-row" style="display:none">
        <div id="auth-avatar" class="auth-avatar"></div>
        <span id="auth-username-label"></span>
        <button id="auth-profile-btn" title="Profile">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.3"/>
            <circle cx="7" cy="5.5" r="2" stroke="currentColor" stroke-width="1.3"/>
            <path d="M2 12c0-2.5 2.2-4 5-4s5 1.5 5 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Status -->
    <div id="status-bar">
      <span class="status-dot"></span>
      <span id="status-text">Ready</span>
    </div>

  </aside>

  <!-- MAP -->
  <div id="map"></div>

  <!-- EXPAND PANEL BUTTON (visible when collapsed) -->
  <button id="expand-btn" title="Expand sidebar" onclick="togglePanel()" style="display:none">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path d="M5 2L10 7L5 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <!-- SCALE BAR -->
  <div id="scale-bar"></div>

  <!-- Auth modal -->
  <div id="auth-modal" class="modal-overlay" style="display:none">
    <div class="auth-card" id="auth-card-container">
      <button class="auth-card-close" id="auth-modal-close">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
      <div id="auth-card-login" class="auth-card-form">
        <h2>Log in</h2>
        <p>Welcome back! Sign in to your account.</p>
        <div id="auth-modal-error" class="auth-card-error"></div>
        <div class="form-group">
          <label for="auth-modal-login-input">Email or username</label>
          <input type="text" id="auth-modal-login-input" placeholder="Enter your email or username" autocomplete="off"/>
        </div>
        <div class="form-group">
          <label for="auth-modal-login-pass">Password</label>
          <input type="password" id="auth-modal-login-pass" placeholder="Enter your password"/>
        </div>
        <button type="submit" class="auth-card-btn" id="auth-card-login-btn">Log in</button>
        <div class="auth-footer">Don't have an account? <a id="auth-switch-to-register">Sign up</a></div>
      </div>
      <div id="auth-card-register" class="auth-card-form" style="display:none">
        <h2>Create account</h2>
        <p>Sign up to access indoor navigation.</p>
        <div id="auth-modal-error-reg" class="auth-card-error"></div>
        <div class="form-group">
          <label for="auth-modal-reg-email">Email</label>
          <input type="email" id="auth-modal-reg-email" placeholder="Enter your email" autocomplete="off"/>
        </div>
        <div class="form-group">
          <label for="auth-modal-reg-username">Username</label>
          <input type="text" id="auth-modal-reg-username" placeholder="3\u201320 chars, start with a letter" autocomplete="off"/>
        </div>
        <div class="form-group">
          <label for="auth-modal-reg-pass">Password</label>
          <input type="password" id="auth-modal-reg-pass" placeholder="At least 8 characters" autocomplete="off"/>
        </div>
        <div class="form-group">
          <label for="auth-modal-reg-pass2">Confirm password</label>
          <input type="password" id="auth-modal-reg-pass2" placeholder="Confirm your password" autocomplete="off"/>
        </div>
        <button type="submit" class="auth-card-btn" id="auth-card-reg-btn">Sign up</button>
        <div class="auth-footer">Already have an account? <a id="auth-switch-to-login">Log in</a></div>
      </div>
    </div>
  </div>

  <!-- Profile modal -->
  <div id="profile-modal" class="modal-overlay" style="display:none">
    <div class="profile-card">
      <button class="auth-card-close" id="profile-modal-close">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
      <div class="profile-avatar-lg" id="profile-avatar"></div>
      <div class="profile-username" id="profile-username"></div>
      <div class="profile-email" id="profile-email"></div>
      <button class="profile-logout-btn" id="profile-logout-btn">Log out</button>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/layers.js"></script>
  <script src="js/search.js"></script>
  <script src="js/route.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/map.js"></script>
</body>
</html>
